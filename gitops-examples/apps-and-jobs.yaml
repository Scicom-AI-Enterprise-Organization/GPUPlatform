# A serverless inference endpoint, a benchmark and a training run.
# Apps + jobs spawn REAL GPU workers when applied — review spend before syncing.
---
kind: App
name: llama3-8b
spec:
  model: meta-llama/Llama-3-8B-Instruct
  gpu: H100
  gpu_count: 1
  # provider_id: runpod-prod          # optional: a managed Provider name, or omit for the platform default
  autoscaler:
    max_containers: 3
    tasks_per_container: 8
    idle_timeout_s: 300
  vllm_args: "--max-model-len 8192"
---
# Submit-once-by-name. Bump `generation` to run again with the same name.
kind: Benchmark
name: llama3-throughput
generation: 1
spec:
  provider_id: tm-h20                 # cross-ref → the Provider in infra.yaml
  storage_id: prod-s3
  config_yaml: |
    model: meta-llama/Llama-3-8B-Instruct
    concurrency: [1, 8, 32]
    input_tokens: 512
    output_tokens: 128
---
kind: TrainingRun
name: whisper-finetune-v1
generation: 1
spec:
  dataset_id: my-asr-corpus           # cross-ref → the Dataset in datasets.yaml
  base_model: openai/whisper-small
  task_type: asr
  provider_id: tm-h20
  storage_id: prod-s3
  max_epochs: 3
  batch_size: 8
  learning_rate: 0.00001
  eval_methods: ["wer", "cer"]
