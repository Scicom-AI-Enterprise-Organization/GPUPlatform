# Infrastructure: GPU providers + storage backends.
# Secrets (private_key, S3 creds, HF token) are referenced by their Secrets key —
# create them under Admin → Secrets first. Nothing secret is committed here.
---
kind: Provider
name: tm-h20
spec:
  kind: vm
  vm:
    host: 10.0.0.5
    port: 22
    user: root
    private_key_secret: TM_H20_SSH_KEY      # Secrets key → PEM body
---
# A RunPod cloud account (uncomment + set RUNPOD_ACCOUNT_KEY in Secrets):
# kind: Provider
# name: runpod-prod
# spec:
#   kind: runpod
#   api:
#     api_key_secret: RUNPOD_ACCOUNT_KEY
---
kind: Storage
name: prod-s3
spec:
  kind: s3
  bucket: my-platform-bucket
  prefix: gpu-platform/
  region: ap-southeast-1
  access_key_id_secret: PROD_S3_ACCESS_KEY_ID
  secret_access_key_secret: PROD_S3_SECRET_ACCESS_KEY
---
kind: Storage
name: hf-push
spec:
  kind: huggingface
  hf_token_secret: HF_TOKEN
