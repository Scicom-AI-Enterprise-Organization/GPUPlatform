# Values for the serverlessgpu chart.
# Override via `helm install ... -f my-values.yaml` or `--set key=value`.

image:
  # Gateway image lives in private AWS ECR. EKS pulls via the node IAM role —
  # no imagePullSecret needed. CI publishes on every main commit.
  registry: 865626945255.dkr.ecr.ap-southeast-5.amazonaws.com/aies
  repository: serverlessgpu-gateway-ecr
  tag: "latest"          # pin to a SHA in real prod (e.g. "a1b2c3d")
  pullPolicy: IfNotPresent
  # Set only if you've moved the image to a registry needing auth secrets.
  imagePullSecrets: []

# PI worker image — pulled by Prime Intellect's network, NOT by your EKS.
# Lives in ECR Public Gallery so PI can pull without AWS credentials.
# PI's custom template references this URL.
workerImage:
  registry: public.ecr.aws/o6x1g6b0   # AWS-assigned ECR Public alias for account 865626945255
  repository: serverlessgpu-pi-worker
  tag: "latest"

gateway:
  replicaCount: 1
  # Multi-replica HA. When true (and replicaCount >= 2) every replica serves the
  # data plane (LLM proxy + API) but only ONE — elected via a Redis lock — runs
  # the mutating controllers (autoscaler/reconciler/janitors/gitops/log-archive),
  # so they don't fight. On leader-pod death a follower promotes within
  # ~LEADER_TTL_S. Sets GATEWAY_HA=1. Safe to leave false at replicaCount: 1.
  # REQUIRED before setting replicaCount > 1 with autoscaler: true — otherwise
  # every replica runs its own autoscaler and double-provisions.
  ha: false
  # Cross-replica correctness for the LLM proxy (PROXY_CLUSTER). Auto-on whenever
  # HA is on or replicaCount > 1 — leave unset and it follows scaling. Set true to
  # force it on at replicaCount: 1 (e.g. a single replica you expect to scale).
  # Without it, a proxy endpoint's max_concurrency is enforced per-replica, so N
  # replicas allow N× the cap. Fails open on Redis errors.
  proxyCluster: false
  # PodDisruptionBudget — rendered automatically once replicaCount >= 2 so a
  # node drain / rollout can never evict every gateway at once. No-op (not
  # rendered) at replicaCount: 1, where it would deadlock drains instead.
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Toggle the autoscaler. When on, set provider + PI env (see below).
  autoscaler: true
  provider: primeintellect       # "fake" for staging without burning GPU $$, "primeintellect" for prod

  # Disable cloud GPU providers (RunPod / Prime Intellect) platform-wide. When
  # true, the gateway refuses to build / select / credential them, and the
  # providers, compute and benchmark APIs reject cloud kinds — only physical
  # `vm` (and `fake`) workers are allowed. Use in locked-down clusters (e.g.
  # CAE / CCE) where workers run only on private VMs over a tailnet and Redis
  # is svc-only. Set gateway.provider to `vm` or `fake` when this is true.
  disableCloudProviders: false

  # Public URL workers dial back to. Must be reachable from PI's network.
  # If left empty AND ingress.enabled, this is auto-derived from ingress.host
  # (with the right scheme based on ingress.tls.enabled). Set explicitly only
  # if you front the gateway with something other than this chart's ingress.
  publicUrl: ""                  # auto: ingress.host derives this

  # API-key auth. Comma-separated bearer tokens. Empty = auth DISABLED — set
  # this before exposing the ingress publicly. Stored in a Secret.
  apiKeys: ""

  # Affinity / anti-affinity to spread replicas across nodes.
  podAntiAffinity: true

  # Override what URL the gateway tells workers to connect to for redis.
  # If empty, uses the cluster-internal URL (with password if redis.password
  # is set). Set this to a public hostname (e.g. via redis.publicLoadBalancer)
  # when workers run outside the cluster (RunPod, bare-metal, etc.).
  workerRedisUrl: ""

ingress:
  enabled: true
  className: nginx
  host: api.serverlessgpu.example.com
  # Optional second hostname routed at the web UI (when web.enabled).
  webHost: ""
  # Optional nginx max request body size (e.g. "5m"). Empty leaves the
  # ingress-nginx default (1m). Applies to the whole Ingress (both hosts).
  proxyBodySize: ""
  tls:
    enabled: true
    # If using cert-manager, this annotation is enough; certificate auto-issues.
    issuer: letsencrypt-prod
  # Set true to add a CORS-friendly header for browser clients
  cors: false

web:
  enabled: false
  replicaCount: 1
  image:
    registry: 865626945255.dkr.ecr.ap-southeast-5.amazonaws.com/aies
    repository: serverlessgpu-web-ecr
    tag: "latest"
    pullPolicy: IfNotPresent
  # If empty, derived from ingress.host (same as the gateway URL).
  publicGatewayUrl: ""
  # In-cluster gateway URL shown as the "Internal" option in the Run-a-job
  # snippet cards (lets callers inside the cluster skip the ingress hop). If
  # empty, derived from the gateway Service DNS:
  # http://<release>-serverlessgpu-gateway.<namespace>.svc.cluster.local
  internalGatewayUrl: ""
  # Optional RunPod API key the UI uses for direct read-only RunPod calls
  # (worker status etc.). Set via --set; never commit.
  runpodApiKey: ""
  runpodNamePrefix: "serverlessgpu"
  extraEnv: []
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

postgres:
  enabled: true
  image: postgres:16-alpine
  user: serverlessgpu
  database: serverlessgpu
  password: ""                   # required when enabled; set via --set or values override
  storage:
    size: 5Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Prometheus postgres_exporter — a small standalone Deployment (NOT a sidecar,
  # so it never restarts the DB) that connects to the postgres Service and
  # exposes engine metrics (pg_up, connections, txn rates, locks, replication,
  # db/table sizes, …) at :9187/metrics. The cluster's Grafana Alloy
  # auto-discovers the ServiceMonitor below (gated on metrics.serviceMonitor.enabled
  # + the monitoring.coreos.com CRDs) and ships it to VictoriaMetrics.
  metrics:
    enabled: true                # runs the exporter; needs metrics.serviceMonitor.enabled=true to actually be scraped
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    pullPolicy: IfNotPresent      # the exporter's own image (NOT image.pullPolicy, which is the gateway's)
    # Connects with the app's own POSTGRES_USER/PASSWORD (read from the
    # <fullname>-postgres-auth secret). For least-privilege, create a dedicated
    # role granted pg_monitor and point a separate secret at it instead.
    sslmode: disable             # in-cluster postgres:16-alpine has no TLS
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

redis:
  enabled: true
  image: redis:7-alpine
  # If set, redis-server starts with --requirepass and gateway+workers use it
  # in REDIS_URL. Required when publicLoadBalancer is enabled.
  password: ""
  # Expose redis via a dedicated AWS NLB. Public (internet-facing) so workers
  # outside the VPC (RunPod, bare-metal) can connect with the password.
  publicLoadBalancer:
    enabled: false
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "6379"
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "TCP"
  storage:
    size: 5Gi
    storageClassName: ""         # default storage class
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Prime Intellect provider config — only consumed when gateway.provider == primeintellect.
# These get baked into a Secret + ConfigMap mounted on the gateway pods.
primeintellect:
  apiKey: ""                     # PI_API_KEY (set via --set or values override; never commit)
  customTemplateId: ""           # PI_CUSTOM_TEMPLATE_ID (id of your worker template on PI)
  apiBase: "https://api.primeintellect.ai"
  providerType: "runpod"
  cloudId: ""
  gpuSocket: "PCIe"
  dataCenterId: ""
  maxPriceHr: ""                 # leave blank to disable cap

# RunPod provider config — only consumed when gateway.provider == runpod.
# Baked into a Secret on the gateway pods. tsAuthKey is optional but required
# when the gateway's redis is only reachable via your tailnet.
runpod:
  apiKey: ""                     # RUNPOD_API_KEY (set via --set; never commit)
  templateId: ""                 # RUNPOD_TEMPLATE_ID (id of your private template)
  apiBase: "https://rest.runpod.io/v1"
  cloudType: "COMMUNITY"         # COMMUNITY (cheaper, unverified hosts) or SECURE
  containerDiskInGb: 50
  volumeInGb: 0
  tsAuthKey: ""                  # TS_AUTHKEY (Tailscale, set via --set if redis is on a tailnet)

# Extra env passed to the gateway pod (last writer wins over the above).
extraEnv: []
# - name: LOG_LEVEL
#   value: DEBUG

# Metrics scraping. The gateway always serves /metrics; this toggle just
# emits a ServiceMonitor so Grafana Alloy / kube-prometheus-stack can find
# it. Requires the monitoring.coreos.com CRDs (prometheus-operator-style).
metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    # Separate, gentler interval for the /metrics/resources inventory exporter
    # (platform_* gauges) — it hits Postgres on every scrape and barely moves.
    resourceInterval: 60s
  # Ship the gateway alert rules (availability, 5xx/latency, queue backlog,
  # autotrain failures, LLM-proxy health) as a PrometheusRule so the cluster's
  # prometheus-operator picks them up. Same CRD gate as the ServiceMonitor.
  # Mirrors deploy/monitoring/prometheus/alerts.yml — keep the two in sync.
  prometheusRule:
    enabled: true
    # Extra labels the operator's ruleSelector may require (e.g. release: kps).
    additionalLabels: {}

# GitOps mode: when true, the chart skips rendering Secret resources for
# postgres/redis/runpod/primeintellect/auth/web. You must provision matching
# Secrets out-of-band (e.g. SealedSecrets in your ArgoCD repo) with these
# names and keys:
#   <fullname>-postgres-auth   -> POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
#   <fullname>-redis-auth      -> REDIS_PASSWORD
#   <fullname>-runpod          -> RUNPOD_API_KEY [, TS_AUTHKEY]
#   <fullname>-pi              -> PI_API_KEY
#   <fullname>-auth            -> GATEWAY_API_KEYS
#   <fullname>-web             -> RUNPOD_API_KEY
# Where <fullname> is fullnameOverride or release name + chart name.
externalSecrets: false

# When externalSecrets is true and the gateway needs a worker-facing redis URL
# different from the internal one (e.g. public NLB), set the host:port here.
# The gateway constructs WORKER_REDIS_URL at runtime as
#   redis://:$(REDIS_PASSWORD)@<host>:<port>
# This avoids embedding the password in values.yaml. Default port 6379.
gateway_workerRedisHost: ""
