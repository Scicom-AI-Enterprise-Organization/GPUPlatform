{{- if and .Values.metrics.serviceMonitor.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "serverlessgpu.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "serverlessgpu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  selector:
    matchLabels:
      {{- include "serverlessgpu.gateway.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | default "10s" }}
    # Platform resource inventory (platform_* gauges: apps, datasets, users,
    # benchmarks, autotrain runs, GPU providers, compute pods, GitOps). Sampled
    # from Postgres on each scrape and slow-moving, so scrape it less often.
    - port: http
      path: /metrics/resources
      interval: {{ .Values.metrics.serviceMonitor.resourceInterval | default "60s" }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | default "15s" }}
{{- end }}
