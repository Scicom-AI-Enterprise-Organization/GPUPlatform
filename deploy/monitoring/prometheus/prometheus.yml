global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # The gateway's API-layer RED metrics (gateway_requests_total /
  # gateway_request_duration_seconds) + queue/worker gauges, all from /metrics.
  # The gateway runs on the host (.venv/bin/gateway on :8080).
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          instance: gateway-local

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
