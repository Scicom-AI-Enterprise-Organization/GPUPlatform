global:
  scrape_interval: 15s
  scrape_timeout: 10s

# Gateway alert rules (availability, 5xx/latency, queue backlog, autotrain
# failures, LLM-proxy health). Kept in sync with the Helm PrometheusRule.
rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # The gateway's API-layer RED metrics (gateway_requests_total /
  # gateway_request_duration_seconds) + queue/worker gauges, all from /metrics.
  # The gateway runs on the host (.venv/bin/gateway on :8080).
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          instance: gateway-local

  # Prometheus self-monitoring.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
