# Local load balancer standing in for the k8s Service / Ingress in front of the
# gateway replicas. Default round-robin => successive requests hit gw1/gw2, which
# is exactly what exercises the cross-replica proxy cluster (PROXY_CLUSTER=1).
events {}

http {
  upstream gateways {
    server gateway1:8080;
    server gateway2:8080;
  }

  server {
    listen 8090;

    location / {
      proxy_pass http://gateways;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_buffering off;         # let SSE / streamed chunks through immediately
      proxy_read_timeout 3600s;    # long LLM requests must not time out at the LB
    }
  }
}
