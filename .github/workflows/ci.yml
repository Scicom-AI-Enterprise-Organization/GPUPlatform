name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel older in-flight runs of the same branch on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # needed for AWS OIDC (ECR + ECR Public push)

env:
  AWS_REGION: ap-southeast-5
  ECR_ROLE: arn:aws:iam::865626945255:role/AIES-Serverlessgpu-ECRAccessRole
  ECR_REGISTRY: 865626945255.dkr.ecr.ap-southeast-5.amazonaws.com
  PUBLIC_GATEWAY_URL: https://serverlessgpu.aies.scicom.dev

jobs:
  # Detect which components changed so image builds can be skipped when
  # nothing in their context tree was modified. Workflow changes always
  # rebuild everything (cheap insurance against bad CI edits).
  changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
      helm: ${{ steps.filter.outputs.helm }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ci:
              - '.github/workflows/**'
            gateway:
              - 'gateway/**'
              - '.github/workflows/**'
            web:
              - 'web/**'
              - '.github/workflows/**'
            worker:
              - 'worker-agent/**'
              - '.github/workflows/**'
            helm:
              - 'deploy/helm/**'
              - '.github/workflows/**'

  # Single source of truth for the image tag + whether to push. Pushing only
  # happens on main when the ENABLE_ECR_PUSH repo variable is set; PRs build
  # for validation but never push.
  meta:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.m.outputs.sha_short }}
      push: ${{ steps.m.outputs.push }}
    steps:
      - id: m
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ vars.ENABLE_ECR_PUSH }}" = "true" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint deploy/helm/serverlessgpu/

      - name: Render templates with sample values
        run: |
          helm template ci deploy/helm/serverlessgpu/ \
            --set primeintellect.apiKey=fake-ci-key \
            --set primeintellect.customTemplateId=tmpl-ci \
            --set postgres.password=fake-ci-pw \
            --set ingress.host=api.example.com \
            --set gateway.publicUrl=https://api.example.com \
            --set 'gateway.apiKeys=key1\,key2' > /tmp/rendered.yaml
          # Sanity check the rendered manifests parse as YAML
          python -c "import yaml; list(yaml.safe_load_all(open('/tmp/rendered.yaml')))"

  # ── Multi-arch images: gateway + web ──────────────────────────────────────
  # Matrix builds each component on BOTH a native amd64 runner and a native
  # arm64 runner (no QEMU emulation) and pushes a per-platform tag
  # `<repo>:<sha>-<amd64|arm64>`. The merge-images job then stitches those into
  # a single multi-arch manifest `<repo>:<sha>` + `:latest`.
  #
  #   amd64 → ubuntu-latest        arm64 → ubuntu-24.04-arm
  #
  # Tags: <short-sha> + `latest` (push only on main when ENABLE_ECR_PUSH=true).
  # Auth: GitHub OIDC → IAM role `AIES-Serverlessgpu-ECRAccessRole`.
  build-images:
    name: build ${{ matrix.component }} (${{ matrix.suffix }})
    needs: [helm, changes, meta]
    if: needs.changes.outputs.gateway == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: gateway
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
            repo: aies/serverlessgpu-gateway-ecr
            context: ./gateway
            dockerfile: ./gateway/Dockerfile
          - component: gateway
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
            repo: aies/serverlessgpu-gateway-ecr
            context: ./gateway
            dockerfile: ./gateway/Dockerfile
          - component: web
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
            repo: aies/serverlessgpu-web-ecr
            context: ./web
            dockerfile: ./web/Dockerfile
          - component: web
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
            repo: aies/serverlessgpu-web-ecr
            context: ./web
            dockerfile: ./web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (GitHub OIDC)
        if: needs.meta.outputs.push == 'true' && needs.changes.outputs[matrix.component] == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ECR_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Serverlessgpu

      - name: Login to ECR (private)
        if: needs.meta.outputs.push == 'true' && needs.changes.outputs[matrix.component] == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & maybe push ${{ matrix.component }} (${{ matrix.platform }})
        if: needs.changes.outputs[matrix.component] == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: ${{ needs.meta.outputs.push == 'true' }}
          build-args: |
            NEXT_PUBLIC_GATEWAY_URL=${{ env.PUBLIC_GATEWAY_URL }}
            APP_VERSION=${{ needs.meta.outputs.sha_short }}
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.repo }}:${{ needs.meta.outputs.sha_short }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.component }}-${{ matrix.suffix }},mode=max
          provenance: false

  # ── Merge per-platform images into a multi-arch manifest ──────────────────
  # Only runs when pushing (the per-platform tags must already be in ECR).
  merge-images:
    name: merge ${{ matrix.component }} manifest
    needs: [build-images, changes, meta]
    if: needs.meta.outputs.push == 'true' && (needs.changes.outputs.gateway == 'true' || needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: gateway
            repo: aies/serverlessgpu-gateway-ecr
          - component: web
            repo: aies/serverlessgpu-web-ecr
    steps:
      - name: Configure AWS credentials (GitHub OIDC)
        if: needs.changes.outputs[matrix.component] == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ECR_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Serverlessgpu

      - name: Login to ECR (private)
        if: needs.changes.outputs[matrix.component] == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: needs.changes.outputs[matrix.component] == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        if: needs.changes.outputs[matrix.component] == 'true'
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ matrix.repo }}"
          TAG="${{ needs.meta.outputs.sha_short }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

  # ── PI worker (amd64 only) ────────────────────────────────────────────────
  # vLLM is x86-only and PI's GPU hosts are x86, so this image is single-arch
  # (an arm64 build would fail) and lives in ECR Public, not the private ECR.
  build-worker:
    name: build pi-worker (amd64)
    runs-on: ubuntu-latest
    needs: [helm, changes, meta]
    if: needs.changes.outputs.worker == 'true'
    env:
      ECR_PUBLIC_ALIAS: o6x1g6b0
      WORKER_REPO: serverlessgpu-pi-worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (GitHub OIDC)
        if: needs.meta.outputs.push == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ECR_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-Serverlessgpu

      - name: Login to ECR Public
        if: needs.meta.outputs.push == 'true'
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build & maybe push PI worker image (amd64)
        # Build context is repo root because Dockerfile.pi COPYs
        # `worker-agent/...` and `entrypoint-pi.sh`.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./worker-agent/Dockerfile.pi
          platforms: linux/amd64
          push: ${{ needs.meta.outputs.push == 'true' }}
          tags: |
            public.ecr.aws/${{ env.ECR_PUBLIC_ALIAS }}/${{ env.WORKER_REPO }}:${{ needs.meta.outputs.sha_short }}
            public.ecr.aws/${{ env.ECR_PUBLIC_ALIAS }}/${{ env.WORKER_REPO }}:latest
          cache-from: type=gha,scope=pi-worker
          cache-to: type=gha,scope=pi-worker,mode=max
          provenance: false

      # Local dev fake-worker image (used by docker-compose). Never pushed —
      # this just verifies it builds so `make compose-up` doesn't break for
      # someone who pulled main fresh.
      - name: Build local worker image (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: ./worker-agent
          file: ./worker-agent/Dockerfile
          push: false
          tags: serverlessgpu-worker-local:test
          cache-from: type=gha,scope=worker-local
          cache-to: type=gha,scope=worker-local,mode=max

  # Spin up a real (tiny) k8s cluster, build the gateway image, side-load it,
  # `helm install` the chart, and verify pods reach Ready + /health and /ready
  # return 200. Proves the chart actually deploys end-to-end — without this,
  # we'd only know the chart *renders*, not that it works.
  e2e-helm:
    runs-on: ubuntu-latest
    needs: [helm, changes]
    if: needs.changes.outputs.gateway == 'true' || needs.changes.outputs.helm == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.24.0
          cluster_name: serverlessgpu-e2e
          wait: 60s

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Build gateway image
        run: |
          docker build -t serverlessgpu-gateway:test ./gateway

      - name: Side-load image into kind
        # kind nodes can't pull from your laptop's docker daemon — explicit load
        run: |
          kind load docker-image serverlessgpu-gateway:test --name serverlessgpu-e2e

      - name: helm install (PROVIDER=fake — no PI dependency)
        # Use fake provider so the test doesn't need a real PI key. Skip
        # ingress (no nginx-ingress in this kind cluster) — port-forward
        # is enough to verify pods are healthy.
        run: |
          helm install sgpu deploy/helm/serverlessgpu/ \
            --namespace sgpu --create-namespace \
            --set image.registry=docker.io/library \
            --set image.repository=serverlessgpu-gateway \
            --set image.tag=test \
            --set image.pullPolicy=Never \
            --set gateway.replicaCount=1 \
            --set gateway.podAntiAffinity=false \
            --set gateway.autoscaler=false \
            --set ingress.enabled=false \
            --set redis.storage.size=1Gi \
            --set postgres.password=test-pw \
            --wait --timeout 5m

      - name: Wait for gateway + redis Ready
        run: |
          kubectl -n sgpu rollout status deployment/sgpu-serverlessgpu-gateway --timeout=2m
          kubectl -n sgpu rollout status statefulset/sgpu-serverlessgpu-redis --timeout=2m
          kubectl -n sgpu get pods -o wide

      - name: Probe /health and /ready
        run: |
          kubectl -n sgpu port-forward svc/sgpu-serverlessgpu-gateway 8080:80 &
          PF_PID=$!
          sleep 3
          set -x
          curl -fsS http://127.0.0.1:8080/health
          curl -fsS http://127.0.0.1:8080/ready
          curl -fsS http://127.0.0.1:8080/metrics | head -20
          kill $PF_PID || true

      - name: Capture logs on failure
        if: failure()
        run: |
          kubectl -n sgpu describe pods
          kubectl -n sgpu logs -l app.kubernetes.io/component=gateway --tail=200 || true
          kubectl -n sgpu logs -l app.kubernetes.io/component=redis --tail=50 || true
